name: PetanqueZ
options:
  bundleIdPrefix: com.alexfrompiter
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top
  developmentLanguage: ru

settings:
  base:
    SWIFT_VERSION: "5.9"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    # Подпись для запуска на устройстве (Personal Team).
    # Automatic стиль + "-" identity означают "sign to run locally".
    # DEVELOPMENT_TEAM НЕ указываем: для бесплатного Apple ID команда
    # подставляется Xcode автоматически (Personal Team).
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: YES
    CODE_SIGNING_ALLOWED: YES

targets:
  PetanqueZ:
    type: application
    platform: iOS
    sources:
      - path: PetanqueZ
        excludes:
          - "**/*.md"
          - "Info.plist"
    resources:
      - path: PetanqueZ/Resources/Assets.xcassets
      - path: PetanqueZ/Resources/Detector.mlpackage
    dependencies:
      - sdk: ARKit.framework
      - sdk: SceneKit.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alexfrompiter.petanque-z
        INFOPLIST_FILE: PetanqueZ/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  PetanqueZTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PetanqueZTests
    dependencies:
      - target: PetanqueZ
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alexfrompiter.petanque-z.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  PetanqueZ:
    build:
      targets:
        PetanqueZ: all
        PetanqueZTests: [test]
    test:
      targets:
        - PetanqueZTests
    run:
      config: Debug
    archive:
      config: Release
